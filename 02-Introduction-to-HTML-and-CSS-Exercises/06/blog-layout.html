<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="blog-layout-styles.css">
    <title>Blog Layout</title>
</head>

<body>
    <header>
        <h1>My Simple Blog</h1>

        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article>
            <header>
                <h2>Blog Post Title</h2>
                
                <p><time>January 1, 2024</time> by <strong>Author Name</strong></p>
            </header>

            <main>
                <p>This is a summary of the blog post...</p>
            </main>

            <footer>
                <a href="#">Read more...</a>
            </footer>
        </article>
    </main>

    <aside>
        <h3>About Me</h3>
        
        <p>Short bio or description about the blog author.</p>
    </aside>

    <footer>
        <h3>Categories</h3>

        <ul>
            <li><a href="#">Web Design</a></li>
            <li><a href="#">HTML</a></li>
            <li><a href="#">CSS</a></li>
        </ul>
        
        <p>&copy; 2024 My Simple Blog. All rights reserved.</p>
    </footer>
</body>

</html>
