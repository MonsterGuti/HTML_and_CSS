<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Custom checkbox and radio</title>
</head>

<body>
    <div class="site-wrapper">
        <form class="site-form">
            <h2>Radio</h2>
            <div>
                <label for="option-1" class="radio-button">
                    <input type="radio" id="option-1" name="option" value="option-1">
                    <span></span>
                    Option 1
                </label>
            </div>
            <div>
                <label for="option-2" class="radio-button">
                    <input type="radio" id="option-2" name="option" value="option-2">
                    <span></span>
                    Option 2
                </label>
            </div>

            <h2>Checkbox</h2>

            <div>
                <label for="checkbox-1" class="checkbox-button">
                    <input type="checkbox" id="checkbox-1" name="checkbox[]" value="checkbox-1">
                    <span></span>
                    Checkbox 1
                </label>
            </div>
            <div>
                <label for="checkbox-2" class="checkbox-button">
                    <input type="checkbox" id="checkbox-2" name="checkbox[]" value="checkbox-2">
                    <span></span>
                    Checkbox 2
                </label>
            </div>

            <div>
                <input type="submit" value="Send">
            </div>


        </form>
    </div>
</body>

</html>
