<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="card-container">

    <header class="navbar">

        <div class="logo">
            <span class="logo-john">JOHN</span><span class="logo-dot">.</span><span class="logo-doe">DOE</span>
        </div>

        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Projects</a>
            <a href="#">Skills</a>
            <a href="#">Blog</a>
            <a href="#">Contact</a>
        </nav>

        <div class="social-links">
            <a href="#" class="gh-link">GH</a>
            <a href="#" class="dr-link">Dr</a>
            <a href="#" class="ig-link">Ig</a>
        </div>

    </header>

    <div class="card-body">

        <section class="hero-section">

            <div class="hero-content">

                <h1>John Doe</h1>

                <p>
                    Available for freelance projects and collaborations.
                    I bring ideas to life through thoughtful design and
                    clean code.
                </p>

                <a href="#" class="btn-work">
                    View My Work >
                </a>

            </div>

            <div class="image-wrapper">
                <img src="images/profile_350x350.png"
                     alt="Profile"
                     class="profile-img">
            </div>

        </section>

        <section class="trusted-section">

            <span class="trusted-title">Trusted by:</span>

            <div class="logos-container">

                <div class="logo-circle">
                    <span class="logo-notion">Notion</span>
                </div>

                <div class="logo-circle">
                    <span class="logo-figma">Figma</span>
                </div>

                <div class="logo-circle">
                    <span class="logo-webflow">Webflow</span>
                </div>

                <div class="logo-circle">
                    <span class="logo-framer">Framer</span>
                </div>

                <div class="logo-circle">
                    <span class="logo-adobe">Adobe</span>
                </div>

            </div>

        </section>

    </div>

</main>

</body>
</html>
